<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Legal RAG</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; background: #0f172a; color: #e2e8f0; }
        h1 { color: #818cf8; }
        textarea { width: 100%; background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 14px; resize: vertical; }
        button { margin-top: 12px; background: #4f46e5; color: white; border: none; padding: 10px 28px; border-radius: 8px; cursor: pointer; font-size: 15px; }
        button:hover { background: #4338ca; }
        .recent { margin-top: 40px; }
        .run-item { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: #e2e8f0; }
        .run-item:hover { border-color: #6366f1; }
        .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
        .SUCCESS { background: #14532d; color: #86efac; }
        .FAILURE { background: #7f1d1d; color: #fca5a5; }
        .STARTED { background: #1e3a5f; color: #93c5fd; }
        .PENDING { background: #292524; color: #d6d3d1; }
    </style>
</head>
<body>

<h1>⚖ Legal RAG System</h1>
<p style="color:#94a3b8;">Enter an English legal question to retrieve Swiss law citations.</p>

<form method="POST" action="{% url 'run_query' %}">
    {% csrf_token %}
    <textarea
        name="query_text"
        rows="4"
        required
        placeholder="e.g. What are the rights of a property owner to use their land?"
    ></textarea>
    <br>
    <button type="submit">Run Pipeline →</button>
</form>

{% if recent_runs %}
<div class="recent">
    <p style="color:#64748b; font-size:13px;">Recent queries</p>
    {% for run in recent_runs %}
    <a class="run-item"
       href="{% if run.is_complete %}/results/{{ run.task_id }}/{% else %}/status/{{ run.task_id }}/{% endif %}">
        <span style="font-size:13px;">{{ run.query_text|truncatechars:70 }}</span>
        <span class="badge {{ run.status }}">{{ run.status }}</span>
    </a>
    {% endfor %}
</div>
{% endif %}

</body>
</html>
