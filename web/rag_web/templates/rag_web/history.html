<!DOCTYPE html>
<html>
<head><title>History — Legal RAG</title>
<style>
body { font-family: sans-serif; max-width: 800px; margin: 40px auto; background: #0f172a; color: #e2e8f0; padding: 0 20px; }
h1 { color: #818cf8; }
a { color: #6366f1; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px; font-size: 12px; color: #64748b; border-bottom: 1px solid #1e293b; }
td { padding: 10px; border-bottom: 1px solid #1e293b; font-size: 13px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
.SUCCESS { background: #14532d; color: #86efac; }
.FAILURE { background: #450a0a; color: #fca5a5; }
.STARTED { background: #1e3a5f; color: #93c5fd; }
.PENDING { background: #292524; color: #d6d3d1; }
</style>
</head>
<body>
<a href="/">← Home</a>
<h1>Query History</h1>
{% if runs %}
<table>
<thead><tr><th>Query</th><th>Status</th><th>Time</th><th>When</th></tr></thead>
<tbody>
{% for run in runs %}
<tr>
    <td><a href="{% if run.is_complete %}/results/{{ run.task_id }}/{% else %}/status/{{ run.task_id }}/{% endif %}">{{ run.query_text|truncatechars:60 }}</a></td>
    <td><span class="badge {{ run.status }}">{{ run.status }}</span></td>
    <td>{{ run.duration_display }}</td>
    <td>{{ run.created_at|timesince }} ago</td>
</tr>
{% endfor %}
</tbody>
</table>
{% else %}
<p style="color:#64748b;">No queries yet. <a href="/">Run your first query →</a></p>
{% endif %}
</body>
</html>
